name: Release Build

on:
  release:
    types: [created]

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
          - x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --target ${{ matrix.target }} --release

      - name: Prepare Assets
        run: |
          mkdir -p assets
          if [ -f target/${{ matrix.target }}/release/path-mgr.exe ]; then
            cp target/${{ matrix.target }}/release/path-mgr.exe assets/path-mgr-${{ matrix.target }}.exe
          fi
          if [ -f target/${{ matrix.target }}/release/path-mgr ]; then
            cp target/${{ matrix.target }}/release/path-mgr assets/path-mgr-${{ matrix.target }}
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
